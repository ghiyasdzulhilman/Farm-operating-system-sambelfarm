openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Farm Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: notion
    description: Notion integration operations
  - name: dashboard
    description: Dashboard summary data

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /notion/connect:
    post:
      operationId: initiateNotionOAuth
      tags: [notion]
      summary: Initiate Notion OAuth flow
      description: Returns the Notion OAuth authorization URL for the current user
      security:
        - clerkAuth: []
      responses:
        "200":
          description: OAuth URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotionOAuthUrl"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notion/callback:
    get:
      operationId: handleNotionOAuthCallback
      tags: [notion]
      summary: Handle Notion OAuth callback
      description: Exchanges OAuth code for access token and stores it
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Connected successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotionConnectionStatus"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notion/status:
    get:
      operationId: getNotionConnectionStatus
      tags: [notion]
      summary: Get Notion connection status for current user
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotionConnectionStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notion/disconnect:
    post:
      operationId: disconnectNotion
      tags: [notion]
      summary: Disconnect Notion integration
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Disconnected successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotionConnectionStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notion/dropdown-options:
    get:
      operationId: getDropdownOptions
      tags: [notion]
      summary: Get dropdown options for expense form
      description: Returns list of Kategori Pengeluaran and Laba Rugi (area) pages from Notion
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Dropdown options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropdownOptions"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Notion not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notion/harvest-dropdown-options:
    get:
      operationId: getHarvestDropdownOptions
      tags: [notion]
      summary: Get dropdown options for harvest form
      description: Returns list of Pindah Tanam pages from Notion for the Area field
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Harvest dropdown options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HarvestDropdownOptions"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Notion not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notion/add-harvest:
    post:
      operationId: addHarvest
      tags: [notion]
      summary: Add a new harvest entry to Notion Panen database
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddHarvestBody"
      responses:
        "201":
          description: Harvest created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddHarvestResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Notion not connected or Panen database not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notion/add-expense:
    post:
      operationId: addExpense
      tags: [notion]
      summary: Add a new expense entry to Notion Expenses database
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddExpenseBody"
      responses:
        "201":
          description: Expense created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddExpenseResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Notion not connected or Expenses database not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get financial summary from Notion Laba Rugi database
      description: Returns total pendapatan and total pengeluaran from the user's connected Notion workspace
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Financial summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Notion not connected or database not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    clerkAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    NotionOAuthUrl:
      type: object
      properties:
        url:
          type: string
        state:
          type: string
      required:
        - url
        - state

    NotionConnectionStatus:
      type: object
      properties:
        connected:
          type: boolean
        workspaceName:
          type: ["string", "null"]
        workspaceIcon:
          type: ["string", "null"]
        connectedAt:
          type: ["string", "null"]
      required:
        - connected
        - workspaceName
        - workspaceIcon
        - connectedAt

    NotionOption:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name

    DropdownOptions:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/NotionOption"
        areas:
          type: array
          items:
            $ref: "#/components/schemas/NotionOption"
      required:
        - categories
        - areas

    AddExpenseBody:
      type: object
      properties:
        pengeluaran:
          type: string
          description: Expense name (Title property)
        date:
          type: string
          description: Date in ISO 8601 format (YYYY-MM-DD)
        qty:
          type: number
          description: Quantity
        hargaPerPcs:
          type: number
          description: Price per unit
        kategoriId:
          type: string
          description: Page ID of the related Kategori Pengeluaran entry
        areaId:
          type: string
          description: Page ID of the related Laba Rugi (area) entry
      required:
        - pengeluaran
        - date
        - qty
        - hargaPerPcs
        - kategoriId
        - areaId

    HarvestDropdownOptions:
      type: object
      properties:
        pindahTanam:
          type: array
          items:
            $ref: "#/components/schemas/NotionOption"
        labaRugi:
          type: array
          items:
            $ref: "#/components/schemas/NotionOption"
      required:
        - pindahTanam
        - labaRugi

    AddHarvestBody:
      type: object
      properties:
        kegiatan:
          type: string
          description: Harvest activity name (Title property)
        jumlahPanen:
          type: number
          description: Harvest quantity in kg
        hargaJualPerKg:
          type: number
          description: Selling price per kg
        kualitas:
          type: string
          description: Harvest quality grade
        channelPenjualan:
          type: string
          description: Sales channel
        pindahTanamId:
          type: string
          description: Page ID of the related Pindah Tanam entry (Area Pindah Tanam relation)
        labaRugiId:
          type: string
          description: Page ID of the related Laba Rugi entry (Area Laba Rugi relation)
      required:
        - kegiatan
        - jumlahPanen
        - hargaJualPerKg
        - kualitas
        - channelPenjualan
        - pindahTanamId
        - labaRugiId

    AddHarvestResult:
      type: object
      properties:
        success:
          type: boolean
        pageId:
          type: string
          description: Notion page ID of the newly created harvest entry
      required:
        - success
        - pageId

    AddExpenseResult:
      type: object
      properties:
        success:
          type: boolean
        pageId:
          type: string
          description: Notion page ID of the newly created expense
      required:
        - success
        - pageId

    DashboardSummary:
      type: object
      properties:
        totalPendapatan:
          type: number
          description: Total income from Laba Rugi database
        totalPengeluaran:
          type: number
          description: Total expenses from Laba Rugi database
        labaRugi:
          type: number
          description: Net profit/loss (pendapatan - pengeluaran)
        currency:
          type: string
          description: Currency code (IDR)
        lastUpdated:
          type: ["string", "null"]
          description: ISO timestamp of last data fetch
        notionDatabaseId:
          type: ["string", "null"]
          description: Notion database ID used
      required:
        - totalPendapatan
        - totalPengeluaran
        - labaRugi
        - currency
        - lastUpdated
        - notionDatabaseId
