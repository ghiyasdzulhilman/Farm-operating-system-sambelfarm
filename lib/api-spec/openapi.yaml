openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Farm Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard summary data

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get financial summary
      description: Returns total pendapatan and total pengeluaran from the farm database
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Financial summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Data not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    clerkAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    DashboardSummary:
      type: object
      properties:
        totalPendapatan:
          type: number
          description: Total income from Laba Rugi database
        totalPengeluaran:
          type: number
          description: Total expenses from Laba Rugi database
        labaRugi:
          type: number
          description: Net profit/loss (pendapatan - pengeluaran)
        currency:
          type: string
          description: Currency code (IDR)
        lastUpdated:
          type: ["string", "null"]
          description: ISO timestamp of last data fetch
      required:
        - totalPendapatan
        - totalPengeluaran
        - labaRugi
        - currency
        - lastUpdated
